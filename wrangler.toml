name = "arena-api"
main = "src/index.ts"
compatibility_date = "2026-07-17"

# spec §2.2 — Cloudflare Workers, always-free layer
[observability]
enabled = true

# --- D1 (spec §9, db/schema.sql) ---
[[d1_databases]]
binding = "DB"
database_name = "arena-db"
database_id = "ec8d6eb2-d284-420c-9bde-39643a8138d3"

# --- R2 (spec §15.3 — cold archive tier) ---
[[r2_buckets]]
binding = "ARCHIVE_BUCKET"
bucket_name = "arena-archive"

# --- Vectorize (spec §2.2/§15 — confirmed free at this project's scale) ---
[[vectorize]]
binding = "ARCHIVE_VECTORS"
index_name = "arena-archive-vectors"

# --- Workers AI (spec §6 — second tier behind Groq in the pooled router) ---
[ai]
binding = "AI"

# --- Event engine cron (Week 3, src/index.ts scheduled()) — ticks the
# ideathon phase scheduler + drains a batch of queued agent work. 5 min,
# matching the ideaconnect precedent for this exact pattern. ---
[triggers]
crons = ["*/5 * * * *"]

# --- Secrets (set via `wrangler secret put`) ---
# GROQ_API_KEY              — spec §5/§6, primary inference tier. Also set as a
#                             repo/org Actions secret for team-build-turn.yml —
#                             same key, two places it's needed.
# (No ADMIN_BEARER_TOKEN Worker secret — spec §7.1's /admin/* auth checks
#  bearer tokens against D1's admin_tokens table directly (hashes only,
#  never a raw value), populated via scripts/make_admin_token.js. A same-
#  named secret binding existed early on but was never actually read by
#  src/auth.ts; removed from src/env.ts as dead code, 2026-07-23.)
# AGENT_API_TOKEN           — spec §10 "Agent token" auth, shared across all
#                             12 agents (they're internal, not external users)
# TAVILY_API_KEY            — spec §3.1 Deep Research (Tavily only — see
#                             project memory on why Exa was dropped)
